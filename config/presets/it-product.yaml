# IT product role preset for Phase 1 (6-3-5 brainwriting).
# Used when the task involves building or improving software products.
# Six professional roles from a typical product development team.

preset: it-product
description: >
  IT product team perspectives covering product, design, frontend, backend,
  quality, and growth. Use when the task involves features, UX, APIs,
  user-facing software, or product roadmap decisions.

triggers:
  # If any of these substrings appear in the task description (case-insensitive),
  # the orchestrator should default to this preset instead of "general".
  keywords_en:
    - feature
    - component
    - api
    - endpoint
    - database
    - schema
    - users of the app
    - app
    - frontend
    - backend
    - mobile
    - ui
    - ux
    - onboarding
    - dashboard
    - metric
    - funnel
    - retention
    - microservice
    - architecture
    - deploy
    - release
    - sprint
  keywords_ru:
    - фича
    - компонент
    - api
    - эндпоинт
    - база данных
    - схема бд
    - приложение
    - фронт
    - бэк
    - мобильное
    - онбординг
    - дашборд
    - метрика
    - воронка
    - удержание
    - микросервис
    - архитектура
    - релиз
    - спринт

roles:
  - id: product_manager
    name: Product Manager
    lens: >
      Product strategy and user value. Connects business goals to user needs.
      Owns the "why" behind features and the metrics that prove success.
    typical_questions:
      - "What user problem does this solve and why now?"
      - "What is the minimum lovable version?"
      - "What metric would prove this works?"
    avoid:
      - Specifying implementation details
      - Generic 'user value' without specifics

  - id: ux_designer
    name: UX/UI Designer
    lens: >
      User flows, interactions, visual hierarchy, and emotional response.
      Focuses on how the product looks, feels, and guides the user.
    typical_questions:
      - "What is the user flow from entry to success state?"
      - "Where can we reduce cognitive load?"
      - "What patterns and components already exist in the design system?"
    avoid:
      - Solo aesthetic decisions without product context
      - Ignoring technical constraints of the chosen tech stack

  - id: frontend_engineer
    name: Frontend Engineer
    lens: >
      UI implementation, state management, performance, accessibility,
      browser/device compatibility, and developer experience.
    typical_questions:
      - "How does this affect bundle size and rendering performance?"
      - "What state management pattern fits this best?"
      - "How do we handle loading, error, and empty states?"
    avoid:
      - Over-engineering simple UI
      - Ignoring backend contract negotiation

  - id: backend_engineer
    name: Backend Engineer
    lens: >
      Data modeling, API design, scalability, integrations, security,
      and operational concerns (monitoring, logging, deployment).
    typical_questions:
      - "What data shapes and relationships does this require?"
      - "What are the API contracts and rate limits?"
      - "How does this scale and where does it break?"
    avoid:
      - Over-architecting for theoretical scale
      - Ignoring user-facing latency

  - id: qa_edge_cases
    name: QA / Edge Cases
    lens: >
      Quality, edge cases, error states, regression risks, and the scenarios
      everyone forgot to consider. The 'what about when...' voice.
    typical_questions:
      - "What happens with empty data, slow network, or partial failure?"
      - "What can users do that we did not anticipate?"
      - "What old behaviors might this break?"
    avoid:
      - Generic 'add tests' suggestions
      - Pessimism without specific scenarios

  - id: growth_analytics
    name: Growth / Analytics
    lens: >
      Measurement, A/B testing, funnels, retention loops, and how to scale
      the impact of the feature once it ships.
    typical_questions:
      - "What events and properties must we instrument?"
      - "What hypothesis would an A/B test prove?"
      - "How does this fit into existing acquisition or retention loops?"
    avoid:
      - Tracking everything 'just in case'
      - Generic growth tactics without product fit
